version: '3.8'

services:
  api:
    build:
      context: ./backend
      target: builder # For development we can use builder to have devDependencies. In prod, switch to `production`
    image: bartech-api:latest
    container_name: bartech_api
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    command: npm run start:dev # Hot reloading enabled for dev

  postgres:
    image: postgres:15-alpine
    container_name: bartech_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kaly123
      POSTGRES_DB: bartech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bartech_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: bartech_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: bartech_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  grafana_data:
